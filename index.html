<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#FF6B35">
  <title>ระบบชำระค่าบำรุงการศึกษา</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

    /* ─── COLOR SYSTEM ─── */
    :root{
      --o1:#FF6B35;
      --o2:#FF5722;
      --o3:#E53935;
      --o-soft:#FFF3EE;
      --o-glow:rgba(255,107,53,.4);
      --grad-main:linear-gradient(135deg,#FFA85C 0%,#FF6B35 50%,#E53935 100%);
      --grad-soft:linear-gradient(135deg,#FFE8DC,#FFF3EE);
      --grad-glow:radial-gradient(circle at 30% 50%,rgba(255,107,53,.15),transparent 50%);

      --bg:#FFF8F2;
      --bg-card:#FFFFFF;
      --bg-elev:#FFFAF6;
      --text:#1a1a2e;
      --text-soft:#6b7280;
      --text-mute:#9ca3af;
      --border:#FFE4D6;
      --border-soft:#fef3eb;

      --r-sm:10px;
      --r:16px;
      --r-lg:24px;
      --r-xl:28px;

      --shadow-sm:0 2px 8px rgba(255,87,34,.08);
      --shadow:0 8px 24px rgba(255,87,34,.12);
      --shadow-lg:0 20px 60px rgba(255,87,34,.18);
      --shadow-glow:0 8px 32px rgba(255,107,53,.32);

      --transition:.25s cubic-bezier(.4,0,.2,1);
      --bounce:.5s cubic-bezier(.34,1.56,.64,1);
    }

    /* ─── DARK MODE ─── */
    [data-theme="dark"]{
      --bg:#1a0f0a;
      --bg-card:#241510;
      --bg-elev:#2d1c15;
      --text:#fff8f2;
      --text-soft:#c5b8b0;
      --text-mute:#8a7d75;
      --border:#3d2820;
      --border-soft:#2a1a13;
      --o-soft:#3d2820;
      --shadow-sm:0 2px 8px rgba(0,0,0,.3);
      --shadow:0 8px 24px rgba(0,0,0,.35);
      --shadow-lg:0 20px 60px rgba(0,0,0,.45);
    }

    html,body{font-family:'Prompt',sans-serif;background:var(--bg);color:var(--text);transition:background var(--transition),color var(--transition);min-height:100vh}
    body{overflow-x:hidden;background-image:var(--grad-glow);background-attachment:fixed}

    /* ─── HERO ─── */
    .hero{
      background:var(--grad-main);
      padding:0 20px 90px;
      position:relative;
      overflow:hidden;
      text-align:center;
    }
    .hero::before{
      content:'';position:absolute;inset:0;
      background:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='.06'%3E%3Cpath d='M50 50c0-5.523 4.477-10 10-10s10 4.477 10 10-4.477 10-10 10c0 5.523-4.477 10-10 10s-10-4.477-10-10 4.477-10 10-10zM10 10c0-5.523 4.477-10 10-10s10 4.477 10 10-4.477 10-10 10c0 5.523-4.477 10-10 10S0 25.523 0 20s4.477-10 10-10zm10 8c4.418 0 8-3.582 8-8s-3.582-8-8-8-8 3.582-8 8 3.582 8 8 8zm40 40c4.418 0 8-3.582 8-8s-3.582-8-8-8-8 3.582-8 8 3.582 8 8 8z'/%3E%3C/g%3E%3C/svg%3E");
      opacity:.6;animation:drift 30s linear infinite;
    }
    @keyframes drift{from{background-position:0 0}to{background-position:80px 80px}}
    .hero::after{
      content:'';position:absolute;bottom:-2px;left:0;right:0;height:70px;
      background:var(--bg);
      border-radius:50% 50% 0 0/70px 70px 0 0;
    }

    /* Floating shapes */
    .shape{position:absolute;border-radius:50%;animation:float 6s ease-in-out infinite;pointer-events:none;opacity:.4}
    .s1{width:120px;height:120px;background:radial-gradient(#fff,transparent);top:30px;right:-20px;animation-delay:0s}
    .s2{width:80px;height:80px;background:radial-gradient(#FFE082,transparent);top:80px;left:10%;animation-delay:1.5s}
    .s3{width:100px;height:100px;background:radial-gradient(#FFCDD2,transparent);bottom:80px;right:15%;animation-delay:3s}
    @keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-15px) scale(1.05)}}

    /* TOP BAR */
    .topbar{position:absolute;top:12px;left:12px;right:12px;display:flex;justify-content:space-between;align-items:center;gap:10px;z-index:10}
    .top-btn{
      background:rgba(255,255,255,.18);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      color:#fff;
      border:1.5px solid rgba(255,255,255,.35);
      padding:9px 14px;border-radius:50px;
      font-size:.78rem;font-weight:600;cursor:pointer;
      font-family:'Prompt',sans-serif;
      display:inline-flex;align-items:center;gap:6px;
      transition:all var(--transition);text-decoration:none;
      white-space:nowrap;
    }
    .top-btn:hover{background:rgba(255,255,255,.32);transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.15)}
    .top-btn:active{transform:scale(.96)}
    .top-icon{
      width:38px;height:38px;padding:0;justify-content:center;
    }

    .hero-in{padding-top:60px;position:relative;z-index:2}
    .logo-ring{
      width:96px;height:96px;background:#fff;border-radius:50%;
      margin:0 auto 16px;display:flex;align-items:center;justify-content:center;
      box-shadow:0 12px 32px rgba(0,0,0,.16),inset 0 -3px 0 rgba(0,0,0,.05);
      animation:popIn .7s cubic-bezier(.34,1.56,.64,1) both;
      overflow:hidden;position:relative;
    }
    .logo-ring::before{
      content:'';position:absolute;inset:-3px;border-radius:50%;
      background:conic-gradient(from 0deg,#FF6B35,#FFD54F,#FF6B35);
      animation:spin 4s linear infinite;z-index:-1;
    }
    .logo-ring img{width:88px;height:88px;object-fit:contain;border-radius:50%}
    @keyframes popIn{from{opacity:0;transform:scale(.5) rotate(-180deg)}to{opacity:1;transform:scale(1) rotate(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}

    .hero h1{color:#fff;font-size:clamp(1.2rem,4.5vw,1.6rem);font-weight:700;line-height:1.3;animation:up .6s .2s ease both;text-shadow:0 2px 8px rgba(0,0,0,.15)}
    .hero p{color:rgba(255,255,255,.92);font-size:.88rem;margin-top:6px;animation:up .6s .3s ease both}
    @keyframes up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

    /* ─── ANNOUNCEMENT BANNER ─── */
    .anno{
      max-width:580px;margin:14px auto 0;padding:0 14px;
      animation:up .6s .4s ease both;position:relative;z-index:3;
    }
    .anno-card{
      background:rgba(255,255,255,.96);
      backdrop-filter:blur(20px);
      border-radius:14px;padding:12px 14px;
      display:flex;align-items:flex-start;gap:10px;
      box-shadow:0 8px 24px rgba(0,0,0,.12);
      border-left:4px solid #FFB74D;
      animation:slideAnno .5s ease both;
      position:relative;
    }
    [data-theme="dark"] .anno-card{background:rgba(45,28,21,.96)}
    @keyframes slideAnno{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
    @keyframes slideOut{to{opacity:0;transform:translateX(-30px) scale(.95);max-height:0;margin:0;padding-top:0;padding-bottom:0;border:none}}
    .anno-card.closing{animation:slideOut .35s ease forwards;overflow:hidden}
    .anno-icon{
      flex-shrink:0;width:32px;height:32px;
      background:linear-gradient(135deg,#FFB74D,#FF9800);
      border-radius:8px;display:flex;align-items:center;justify-content:center;
      color:#fff;font-size:.95rem;
      animation:bell 2s ease-in-out infinite;
    }
    @keyframes bell{0%,100%{transform:rotate(0)}10%,30%{transform:rotate(-12deg)}20%,40%{transform:rotate(12deg)}50%{transform:rotate(0)}}
    .anno-text{flex:1;font-size:.81rem;line-height:1.55;color:#5d4037;min-width:0;cursor:pointer;user-select:none}
    [data-theme="dark"] .anno-text{color:#e0c8b8}
    .anno-text.collapsed{
      max-height:48px;overflow:hidden;position:relative;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
    }
    .anno-toggle{
      display:inline-block;color:#FF9800;font-weight:600;font-size:.78rem;margin-top:4px;cursor:pointer;
      transition:color var(--transition);
    }
    .anno-toggle:hover{color:#FF6B35}
    .anno-close{
      flex-shrink:0;width:26px;height:26px;border:none;background:transparent;
      color:#999;cursor:pointer;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:.85rem;transition:all var(--transition);
      align-self:flex-start;
    }
    .anno-close:hover{background:#FFE4D6;color:#E53935;transform:rotate(90deg)}
    [data-theme="dark"] .anno-close{color:#888}
    [data-theme="dark"] .anno-close:hover{background:#3d2820;color:#EF5350}

    /* ─── MAIN ─── */
    .main{margin:-50px auto 0;padding:0 14px 120px;max-width:580px;animation:up .6s .35s ease both;position:relative;z-index:2}

    /* SEARCH CARD */
    .sc{
      background:var(--bg-card);
      border-radius:var(--r-xl);
      box-shadow:var(--shadow-lg);
      padding:26px 20px 22px;
      margin-bottom:18px;
      position:relative;overflow:hidden;
      border:1px solid var(--border-soft);
    }
    .sc::before{
      content:'';position:absolute;top:-50%;right:-30%;width:200px;height:200px;
      background:radial-gradient(circle,rgba(255,107,53,.08),transparent);
      pointer-events:none;
    }
    .sl{font-size:.82rem;color:var(--text-soft);margin-bottom:12px;display:flex;align-items:center;gap:8px;font-weight:500}
    .sl i{
      color:var(--o1);width:24px;height:24px;
      display:inline-flex;align-items:center;justify-content:center;
      background:var(--o-soft);border-radius:8px;font-size:.78rem;
    }
    .scol{display:flex;flex-direction:column;gap:10px;position:relative;z-index:1}
    .iw{position:relative;width:100%}
    .iw>i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-mute);font-size:.85rem;pointer-events:none;transition:color var(--transition)}
    .si{
      width:100%;border:2px solid var(--border);border-radius:14px;
      padding:14px 14px 14px 42px;
      font-family:'Prompt',sans-serif;font-size:1rem;font-weight:500;
      outline:none;background:var(--bg-elev);color:var(--text);
      transition:all var(--transition);
      letter-spacing:.5px;
    }
    .si:focus{
      border-color:var(--o1);background:var(--bg-card);
      box-shadow:0 0 0 4px var(--o-glow);
    }
    .si:focus + i,.iw:focus-within>i{color:var(--o1)}
    .si::placeholder{color:var(--text-mute);font-weight:400;letter-spacing:0}
    .btn-s{
      width:100%;background:var(--grad-main);color:#fff;border:none;border-radius:14px;
      padding:15px;font-family:'Prompt',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;
      box-shadow:var(--shadow-glow);
      display:flex;align-items:center;justify-content:center;gap:8px;
      transition:all var(--transition);position:relative;overflow:hidden;
    }
    .btn-s::before{
      content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
      transition:left .6s;
    }
    .btn-s:hover:not(:disabled)::before{left:100%}
    .btn-s:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 28px var(--o-glow)}
    .btn-s:active:not(:disabled){transform:scale(.97)}
    .btn-s:disabled{opacity:.65;cursor:not-allowed}
    @media(min-width:440px){.scol{flex-direction:row;align-items:stretch}.btn-s{width:auto;min-width:120px;flex-shrink:0}}

    /* PROFILE CARD */
    .pc{
      background:var(--grad-soft);
      border-radius:var(--r-lg);
      border:1.5px solid rgba(255,107,53,.18);
      padding:18px;margin-bottom:14px;
      display:flex;align-items:center;gap:14px;
      animation:slideIn .5s ease both;
      position:relative;overflow:hidden;
    }
    [data-theme="dark"] .pc{background:linear-gradient(135deg,#3d2820,#2d1c15)}
    @keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
    .pc::after{
      content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;
      background:radial-gradient(circle,rgba(255,107,53,.15),transparent);
      pointer-events:none;
    }
    .pav{
      width:68px;height:68px;border-radius:50%;
      border:3px solid #fff;
      box-shadow:0 6px 16px rgba(255,87,34,.25);
      object-fit:cover;flex-shrink:0;position:relative;z-index:1;
    }
    .pi{flex:1;min-width:0;position:relative;z-index:1}
    .pi h3{font-size:1rem;font-weight:700;color:var(--text)}
    .pcls{
      display:inline-flex;align-items:center;gap:5px;
      background:var(--grad-main);color:#fff;
      border-radius:50px;padding:3px 12px;font-size:.73rem;font-weight:600;
      margin-top:5px;box-shadow:0 3px 8px rgba(255,87,34,.25);
    }
    .pst{font-size:.75rem;color:var(--text-soft);margin-top:5px;display:flex;align-items:center;gap:4px}
    .pst i{font-size:.7rem;opacity:.6}

    /* PAYMENT HEADER */
    .ph{
      font-size:.8rem;font-weight:700;color:var(--text-soft);
      margin:18px 0 12px;display:flex;align-items:center;gap:8px;
      text-transform:uppercase;letter-spacing:.8px;
    }
    .ph i{
      color:var(--o1);width:26px;height:26px;
      display:inline-flex;align-items:center;justify-content:center;
      background:var(--o-soft);border-radius:8px;font-size:.78rem;
    }

    /* PAYMENT CARD */
    .pi-card{
      background:var(--bg-card);
      border-radius:var(--r-lg);
      border:1.5px solid var(--border-soft);
      margin-bottom:14px;overflow:hidden;
      box-shadow:var(--shadow-sm);
      transition:all var(--transition);
      animation:cardIn .5s ease both;
    }
    .pi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
    @keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    .pbar{height:6px;position:relative;overflow:hidden}
    .pbar::after{
      content:'';position:absolute;inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);
      animation:shimmer 3s infinite;
    }
    @keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
    .bw{background:linear-gradient(90deg,#FFC107,#FFB300)}
    .bc{background:linear-gradient(90deg,#29B6F6,#1E88E5)}
    .bd{background:linear-gradient(90deg,#4CAF50,#43A047)}
    .bf{background:linear-gradient(90deg,#EF5350,#E53935)}
    .pb{padding:18px}
    .pt{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
    .ptit{font-size:.96rem;font-weight:600;line-height:1.4;color:var(--text)}
    .pmeta{font-size:.75rem;color:var(--text-soft);margin-top:4px;display:flex;align-items:center;gap:5px}
    .pmeta i{font-size:.72rem;opacity:.6}
    .pdoc{font-size:.74rem;color:var(--o1);text-decoration:none;margin-top:5px;display:inline-flex;align-items:center;gap:4px;transition:gap var(--transition)}
    .pdoc:hover{gap:7px}
    .pamt{
      font-size:1.3rem;font-weight:800;
      background:var(--grad-main);
      -webkit-background-clip:text;
      background-clip:text;
      -webkit-text-fill-color:transparent;
      letter-spacing:-.3px;
    }
    .pill{
      display:inline-flex;align-items:center;gap:4px;
      border-radius:50px;padding:4px 11px;
      font-size:.72rem;font-weight:600;margin-top:6px;
    }
    .pw{background:#FFF3E0;color:#E65100}
    [data-theme="dark"] .pw{background:#3d2820;color:#FFB74D}
    .pck{background:#E1F5FE;color:#01579B}
    [data-theme="dark"] .pck{background:#1a2a35;color:#4FC3F7}
    .pdn{background:#E8F5E9;color:#1B5E20}
    [data-theme="dark"] .pdn{background:#1a2e1d;color:#81C784}
    .pfl{background:#FFEBEE;color:#B71C1C}
    [data-theme="dark"] .pfl{background:#3d1a1a;color:#EF9A9A}
    .rn{
      background:#FFEBEE;border-left:4px solid #EF5350;border-radius:10px;
      padding:10px 12px;font-size:.78rem;color:#C62828;
      margin-top:12px;display:flex;gap:8px;align-items:flex-start;
    }
    [data-theme="dark"] .rn{background:#3d1a1a;color:#EF9A9A}

    /* QR BOX */
    .qr-box{
      background:linear-gradient(160deg,#F8FBFF,#EFF6FF);
      border:1.5px solid #DBEAFE;
      border-radius:18px;padding:18px 14px 14px;margin-top:14px;text-align:center;
      animation:fadeUp .4s ease both;
    }
    [data-theme="dark"] .qr-box{background:linear-gradient(160deg,#1a2535,#0f1a25);border-color:#2a3a4d}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .ppb{
      display:inline-flex;align-items:center;gap:6px;
      background:#003087;color:#fff;
      border-radius:50px;padding:5px 14px;font-size:.72rem;font-weight:700;
      margin-bottom:11px;box-shadow:0 3px 8px rgba(0,48,135,.3);
    }
    .ppd{width:8px;height:8px;background:#F5A623;border-radius:50%;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}
    .ql{font-size:.84rem;font-weight:700;color:#1565C0;margin-bottom:12px}
    [data-theme="dark"] .ql{color:#64B5F6}
    .qr-wrap{display:inline-block;min-height:180px;min-width:180px;position:relative}
    .qr-wrap svg,.qr-wrap img,.qr-wrap canvas{
      width:180px!important;height:180px!important;
      border-radius:14px;padding:8px;background:#fff;
      box-shadow:0 6px 20px rgba(0,0,0,.12);display:block;
      transition:transform var(--transition);
    }
    .qr-wrap:hover svg,.qr-wrap:hover img,.qr-wrap:hover canvas{transform:scale(1.05)}
    .qr-refs{display:flex;justify-content:center;gap:10px;margin-top:13px;flex-wrap:wrap}
    .qr-chip{
      background:#fff;border:1.5px solid #DBEAFE;border-radius:10px;
      padding:5px 12px;font-size:.74rem;color:#666;
      transition:all var(--transition);
    }
    [data-theme="dark"] .qr-chip{background:#1a2535;color:#aaa;border-color:#2a3a4d}
    .qr-chip:hover{border-color:#1565C0;transform:translateY(-1px)}
    .qr-chip strong{color:var(--text)}
    .qr-hint{font-size:.7rem;color:#90A4AE;margin-top:9px}
    [data-theme="dark"] .qr-hint{color:#607D8B}

    /* UPLOAD BUTTON */
    .btn-up{
      width:100%;margin-top:14px;padding:14px;
      border:2px dashed #FFB347;border-radius:14px;
      background:#FFF8EE;color:var(--o3);
      font-family:'Prompt',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:8px;
      transition:all var(--transition);
    }
    [data-theme="dark"] .btn-up{background:#3d2820;color:#FFB74D;border-color:#5d3820}
    .btn-up:hover{background:#FFEEDB;border-color:var(--o1);transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,107,53,.15)}
    [data-theme="dark"] .btn-up:hover{background:#4d3025}
    .btn-up:active{transform:scale(.98)}

    /* EMPTY/SUCCESS */
    .eb{
      background:var(--bg-card);
      border-radius:var(--r-lg);padding:42px 24px;text-align:center;
      box-shadow:var(--shadow-sm);border:1px solid var(--border-soft);
      animation:fadeUp .5s ease both;
    }
    .eb .ico{font-size:3rem;opacity:.3;margin-bottom:12px}
    .eb h4{font-size:1rem;color:var(--text-soft);font-weight:600}
    .eb p{font-size:.82rem;color:var(--text-mute);margin-top:6px}
    .ac{
      background:linear-gradient(135deg,#E8F5E9,#F1F8E9);
      border:1.5px solid #A5D6A7;border-radius:var(--r-lg);
      padding:32px 22px;text-align:center;
      animation:scaleIn .5s ease both;position:relative;overflow:hidden;
    }
    [data-theme="dark"] .ac{background:linear-gradient(135deg,#1a2e1d,#0f1f12);border-color:#2e5b32}
    @keyframes scaleIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
    .ac::before{
      content:'';position:absolute;inset:0;
      background:radial-gradient(circle at 20% 30%,rgba(76,175,80,.1),transparent);
      pointer-events:none;
    }
    .ac i{font-size:2.8rem;color:#4CAF50;margin-bottom:10px;animation:bounce 1.5s ease infinite}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .ac h4{color:#2E7D32;font-size:1.1rem;font-weight:700;position:relative}
    [data-theme="dark"] .ac h4{color:#81C784}

<script>
/* ════════════════════════════════
   DARK MODE
════════════════════════════════ */
function applyTheme(t){
  document.body.dataset.theme = t;
  document.getElementById('darkIcon').className = t==='dark' ? 'fas fa-sun' : 'fas fa-moon';
  document.querySelector('meta[name="theme-color"]').setAttribute('content', t==='dark' ? '#241510' : '#FF6B35');
}
function toggleDark(){
  var cur = document.body.dataset.theme;
  var nx = cur==='dark' ? 'light' : 'dark';
  applyTheme(nx);
  try { localStorage.setItem('theme', nx); } catch(e){}
}
try { applyTheme(localStorage.getItem('theme') || 'light'); } catch(e){ applyTheme('light'); }

/* ════════════════════════════════
   TOAST
════════════════════════════════ */
function toast(text, icon){
  icon = icon || 'check-circle';
  var el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = '<i class="fas fa-'+icon+'"></i> '+text;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(function(){ el.style.transition='all .3s'; el.style.opacity='0'; el.style.transform='translateY(-10px)'; }, 2200);
  setTimeout(function(){ el.remove(); }, 2600);
}

/* ════════════════════════════════
   HELPERS (global)
════════════════════════════════ */
function escapeHTML(s){
  return String(s||'').replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}

function copyAccNumber(num, btn) {
  var fallback = function() {
    var ta = document.createElement('textarea');
    ta.value = num;
    ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(num).catch(fallback);
  } else fallback();
  if (btn) {
    var orig = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-check"></i> คัดลอกแล้ว!';
    btn.style.background = '#2E7D32';
    setTimeout(function(){ btn.innerHTML = orig; btn.style.background = '#4CAF50'; }, 1500);
  }
  if (typeof toast === 'function') toast('คัดลอกเลขบัญชีแล้ว','check-circle');
}

/* ════════════════════════════════
   QR Generator
   - PROMPTPAY: EMV QR (ใช้กับ PromptPay เลขบัตร 13 หลัก)
   - BOT Format: สำหรับ Krungthai Bill Payment ที่สมัครแบบ BOT
     รูปแบบ: |BillerID Ref1 Ref2 Amount(สตางค์)
     ตัวอย่าง: |099400010422700 1100200300401 101169 250000
════════════════════════════════ */
function crc16(s){
  var c=0xFFFF;
  for(var i=0;i<s.length;i++){
    c^=(s.charCodeAt(i)<<8);
    for(var j=0;j<8;j++) c=(c&0x8000)?((c<<1)^0x1021):(c<<1);
  }
  return ('0000'+(c&0xFFFF).toString(16).toUpperCase()).slice(-4);
}
function tlv(t,v){ return t+('00'+v.length).slice(-2)+v; }

function buildQR(qrType, billerId, ref1, ref2, amount){
  var id = String(billerId||'').replace(/\D/g,'');
  var amt = parseFloat(amount);

  // ─── PROMPTPAY ใช้ EMV QR ───
  if (qrType === 'PROMPTPAY') {
    if(id.length !== 13) return null;
    var payload = tlv('00','01') + tlv('01','12');
    var mInfo = tlv('00','A000000677010111') + tlv('02', id);
    payload += tlv('29', mInfo);
    payload += tlv('53','764');
    if (amt > 0) payload += tlv('54', amt.toFixed(2));
    payload += tlv('58','TH') + '6304';
    return payload + crc16(payload);
  }

  // ─── KRUNGTHAI BILL PAYMENT (BOT FORMAT) ───
  // รูปแบบ string ที่ธนาคารกรุงไทยใช้สำหรับ Bill Payment แบบ BOT:
  //   |BillerID Ref1 Ref2 Amount(สตางค์)
  // ตัวอย่างจริงจากใบ Pay-In Slip:
  //   |0994000104227 00 10102 101 250000  (มี space คั่น เพราะแยก Tax+Suffix+Ref1+Ref2+ยอด)
  // หรือรวม BillerID 15 หลัก:
  //   |099400010422700 1100200300401 101169 250000
  if(id.length !== 15) return null;

  var r1 = String(ref1||'').replace(/[^A-Z0-9]/gi,'').toUpperCase();
  var r2 = String(ref2||'').replace(/[^A-Z0-9]/gi,'').toUpperCase();
  var amtSatang = amt > 0 ? Math.round(amt * 100).toString() : '0';

  // BOT Format: |BillerID Ref1 Ref2 Amount(satang)
  // ใช้ "|" ขึ้นต้น และคั่นด้วยช่องว่าง
  var botPayload = '|' + id + ' ' + r1 + ' ' + r2 + ' ' + amtSatang;
  return botPayload;
}

/* ════════════════════════════════
   LOAD SETTINGS
════════════════════════════════ */
/* ════════════════════════════════
   ANNOUNCEMENT - กดปิด/ขยายได้
════════════════════════════════ */
function annoHash(text){
  // hash ง่ายๆ เพื่อตรวจว่าประกาศเปลี่ยนหรือยัง (ถ้าเปลี่ยน → แสดงใหม่)
  var h = 0;
  for (var i = 0; i < text.length; i++) {
    h = ((h << 5) - h) + text.charCodeAt(i);
    h |= 0;
  }
  return String(h);
}

function showAnnouncement(text){
  if(!text || !text.trim()) return;
  // ตรวจว่าผู้ใช้เคยปิดประกาศนี้ไปแล้วหรือยัง
  try {
    var dismissed = localStorage.getItem('annoDismissed');
    if (dismissed === annoHash(text)) return;  // ปิดไปแล้วและประกาศเดิม
  } catch(e){}

  var el = document.getElementById('annoText');
  el.innerText = text;
  document.getElementById('annoBox').style.display = 'block';

  // ตรวจว่าข้อความยาวพอที่ต้องมีปุ่ม "อ่านเพิ่มเติม" หรือไม่
  setTimeout(function(){
    if (el.scrollHeight > el.clientHeight + 2) {
      document.getElementById('annoToggle').style.display = 'inline-block';
    }
  }, 100);
}

function toggleAnno(){
  var el = document.getElementById('annoText');
  var btn = document.getElementById('annoToggle');
  if (el.classList.contains('collapsed')) {
    el.classList.remove('collapsed');
    btn.innerHTML = '<i class="fas fa-chevron-up"></i> ย่อข้อความ';
  } else {
    el.classList.add('collapsed');
    btn.innerHTML = '<i class="fas fa-chevron-down"></i> อ่านเพิ่มเติม';
  }
}

function closeAnno(){
  var card = document.getElementById('annoCard');
  var text = document.getElementById('annoText').innerText;
  card.classList.add('closing');
  // จดจำว่าผู้ใช้ปิดประกาศนี้ไปแล้ว
  try { localStorage.setItem('annoDismissed', annoHash(text)); } catch(e){}
  setTimeout(function(){ document.getElementById('annoBox').style.display = 'none'; }, 350);
}

/* ════════════════════════════════
   LOAD SETTINGS
════════════════════════════════ */
api('/settings').then(function(cfg){
  window.__siteCfg = cfg;
  if(cfg.schoolName) document.getElementById('schoolName').innerText = 'ระบบชำระค่าบำรุงการศึกษา ' + cfg.schoolName;
  if(cfg.logoUrl)    document.getElementById('logoImg').src = cfg.logoUrl;
  if(cfg.announcementOn === 'ON'){
    showAnnouncement(cfg.announcement || '');
  }
  if(cfg.systemStatus === 'OFF'){
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;font-family:Prompt,sans-serif;background:#FFF8F2"><div style="background:#fff;border-radius:24px;padding:40px 28px;text-align:center;max-width:380px;box-shadow:0 8px 32px rgba(255,87,34,.14)"><div style="font-size:3rem;margin-bottom:16px">🔴</div><h2 style="color:#1a1a2e;font-size:1.1rem;font-weight:600;margin-bottom:10px">ระบบปิดชั่วคราว</h2><p style="color:#6b7280;font-size:.88rem;line-height:1.7">'+(cfg.closedMessage||'ระบบปิดชั่วคราว')+'</p></div></div>';
  }
}).catch(function(e){ console.error(e); });

document.getElementById('sid').addEventListener('keydown',function(e){
  if(e.key==='Enter'){e.preventDefault();doSearch();}
});

// Auto-format ID number (just for visual feedback)
document.getElementById('sid').addEventListener('input',function(e){
  this.value = this.value.replace(/\D/g,'').slice(0,13);
});

/* ════════════════════════════════
   SEARCH
════════════════════════════════ */
function doSearch(){
  var id  = document.getElementById('sid').value.trim();
  var btn = document.getElementById('btnS');
  if(!id || id.length!==13 || !/^\d+$/.test(id)){
    Swal.fire({icon:'warning',title:'ข้อมูลไม่ถูกต้อง',text:'กรุณากรอกเลขบัตรประชาชน 13 หลัก',confirmButtonColor:'#FF6B35'});
    return;
  }
  btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> ค้นหา...';
  document.getElementById('skeleton').style.display='block';
  document.getElementById('res').style.display='none';
  document.getElementById('noRes').style.display='none';

  api('/student/search?idCard=' + encodeURIComponent(id))
    .then(function(r){
      btn.disabled=false; btn.innerHTML='<i class="fas fa-search"></i> ค้นหา';
      document.getElementById('skeleton').style.display='none';
      if(r.found){
        renderResult(r);
        toast('ค้นพบข้อมูลแล้ว','check-circle');
      } else {
        document.getElementById('noRes').style.display='block';
      }
    })
    .catch(function(e){
      btn.disabled=false; btn.innerHTML='<i class="fas fa-search"></i> ค้นหา';
      document.getElementById('skeleton').style.display='none';
      Swal.fire({icon:'error',title:'เกิดข้อผิดพลาด',text:e.message||'ไม่สามารถเชื่อมต่อระบบได้',confirmButtonColor:'#FF6B35'});
    });
}

/* ════════════════════════════════
   RENDER
════════════════════════════════ */
function renderResult(data){
  var s = data.student;
  window.__currentPayments = data.payments || [];
  window.__currentIdCard = (s && s.idCard) || (document.getElementById('idCardInput')||{}).value || '';
  document.getElementById('pName').innerText   = s.name;
  document.getElementById('pCls').innerText    = s.class;
  document.querySelector('#pSid span').innerText = 'รหัสนักเรียน: ' + s.studentId;
  if(s.imageUrl) document.getElementById('pAvatar').src = s.imageUrl;
  document.getElementById('res').style.display = 'block';

  var list = document.getElementById('payList');
  if(!data.payments || !data.payments.length){
    list.innerHTML = '<div class="ac"><i class="fas fa-check-circle"></i><h4>ชำระครบแล้ว!</h4><p>ไม่มีรายการค้างชำระ</p></div>';
    return;
  }

  list.innerHTML = '';
  data.payments.forEach(function(p, idx){
    var bar='bw', pil='pw', ico='⏳', txt='รอชำระ', showQR=false, showUp=false, showReceipt=false, note='';
    if(p.status==='กำลังตรวจสอบ'){ bar='bc';pil='pck';ico='🔍';txt='รอตรวจสอบ'; }
    else if(p.status==='ชำระแล้ว'){ bar='bd';pil='pdn';ico='✅';txt='ชำระแล้ว'; showReceipt=true; }
    else if(p.status==='ชำระไม่สำเร็จ'){ bar='bf';pil='pfl';ico='❌';txt='ไม่ผ่าน';showQR=showUp=true;
      note='<div class="rn"><i class="fas fa-exclamation-circle" style="flex-shrink:0;margin-top:2px"></i><span>'+(p.rejectReason||'')+'</span></div>'; }
    else{ showQR=showUp=true; }

    var docH = p.docUrl ? '<a href="'+p.docUrl+'" target="_blank" class="pdoc"><i class="fas fa-file-alt"></i> ดูเอกสาร <i class="fas fa-arrow-right" style="font-size:.65rem"></i></a>' : '';
    var qrId = 'qr-'+idx;
    var card = document.createElement('div'); card.className='pi-card';
    card.style.animationDelay = (idx * 0.08) + 's';
    var qrH = '';

    var qrType = (p.billerSuffix === 'PROMPTPAY') ? 'PROMPTPAY' : 'BILL_PAYMENT';
    var fullBillerId = String(p.taxId||'');
    if (qrType === 'BILL_PAYMENT' && fullBillerId.length === 13 && p.billerSuffix && p.billerSuffix !== 'BILL_PAYMENT') {
      fullBillerId = fullBillerId + p.billerSuffix;
    }

    if(showQR){
      var qrHeader = qrType === 'PROMPTPAY' ? 'พร้อมเพย์ นิติบุคคล' : 'PromptPay Bill Payment';
      qrH = '<div class="qr-box">'
          + '<div class="ppb"><span class="ppd"></span>'+ qrHeader +'</div>'
          + '<div class="ql"><i class="fas fa-qrcode"></i> สแกนจ่าย ฿'+Number(p.amount).toLocaleString('th-TH',{minimumFractionDigits:2})+'</div>'
          + '<div class="qr-wrap" id="'+qrId+'"><div style="width:180px;height:180px;display:flex;align-items:center;justify-content:center;color:#aaa;font-size:.8rem">กำลังสร้าง QR...</div></div>';

      if (qrType === 'BILL_PAYMENT') {
        qrH += '<div class="qr-refs">'
            + '<div class="qr-chip">Ref.1 <strong>'+p.ref1+'</strong></div>'
            + '<div class="qr-chip">Ref.2 <strong>'+p.ref2+'</strong></div>'
            + '</div>';
      } else {
        qrH += '<div style="font-size:0.74rem;color:#E53935;margin-top:9px;background:#FFEBEE;padding:7px;border-radius:8px;border:1px solid #FFCDD2;font-weight:600;"><i class="fas fa-edit"></i> ผู้ปกครองต้องระบุ รหัสนักเรียน ในช่องบันทึกช่วยจำ</div>';
      }
      // ข้อความเตือนใต้ QR — admin ตั้งเองได้ใน settings (qrNotice)
      var noticeText = (window.__siteCfg && window.__siteCfg.qrNotice) ? window.__siteCfg.qrNotice.trim() : '';
      if (noticeText) {
        qrH += '<div style="background:#FFF3E0;border:2px solid #FFB74D;border-radius:10px;padding:8px;margin-top:11px;font-size:.78rem;color:#E65100;font-weight:600;line-height:1.4;text-align:center">'
            + '<i class="fas fa-exclamation-triangle" style="margin-right:4px"></i> '
            + escapeHTML(noticeText)
            + '</div>';
      }
      qrH += '<div class="qr-hint" style="margin-top:6px"><i class="fas fa-mobile-alt"></i> สแกนได้ทุกแอปธนาคาร</div></div>';

      // ─── BANK TRANSFER FALLBACK (ถ้า admin ตั้งบัญชีไว้) ───
      var cfg = window.__siteCfg || {};
      if (cfg.bankAccount && cfg.bankAccount.trim()) {
        var accNo = cfg.bankAccount.replace(/[^0-9-]/g, '');
        qrH += '<div style="margin-top:14px;background:linear-gradient(135deg,#E8F5E9,#F1F8E9);border:2.5px solid #4CAF50;border-radius:14px;padding:14px;position:relative;overflow:hidden">'
            + '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">'
            +   '<div style="width:36px;height:36px;background:#4CAF50;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1rem"><i class="fas fa-university"></i></div>'
            +   '<div style="flex:1">'
            +     '<div style="font-weight:700;color:#1B5E20;font-size:.9rem">📌 ช่องทางสำรอง: โอนเข้าบัญชีโดยตรง</div>'
            +     '<div style="font-size:.72rem;color:#558B2F">ใช้ได้กับทุกแอปธนาคาร 100%</div>'
            +   '</div>'
            + '</div>'
            + '<div style="background:#fff;border-radius:10px;padding:10px;font-size:.85rem;line-height:1.7">';
        if (cfg.bankName) {
          qrH += '<div><span style="color:#666">ธนาคาร:</span> <strong>' + escapeHTML(cfg.bankName) + '</strong></div>';
        }
        qrH += '<div style="display:flex;align-items:center;gap:8px;margin:6px 0">'
            +    '<span style="color:#666">เลขบัญชี:</span>'
            +    '<strong id="acc-' + idx + '" style="color:#2E7D32;font-size:1.05rem;letter-spacing:.5px">' + escapeHTML(accNo) + '</strong>'
            +    '<button onclick="copyAccNumber(\'' + accNo.replace(/-/g,'') + '\', this)" style="margin-left:auto;background:#4CAF50;color:#fff;border:none;border-radius:50px;padding:5px 12px;font-size:.74rem;font-weight:600;cursor:pointer;font-family:inherit"><i class="fas fa-copy"></i> คัดลอก</button>'
            + '</div>';
        if (cfg.bankAccountName) {
          qrH += '<div><span style="color:#666">ชื่อบัญชี:</span> <strong>' + escapeHTML(cfg.bankAccountName) + '</strong></div>';
        }
        qrH += '<div style="background:#FFF3E0;border-left:3px solid #FF9800;padding:7px 10px;margin-top:8px;border-radius:6px;font-size:.76rem;color:#E65100">'
            +    '<i class="fas fa-info-circle"></i> <strong>โอนยอด ฿' + Number(p.amount).toLocaleString('th-TH', {minimumFractionDigits:2}) + '</strong> แล้วใส่ "<strong>' + (p.ref1 || p.transId) + '</strong>" ในบันทึกช่วยจำ'
            + '</div>';
        qrH += '</div></div>';
      }
    }
    var upH = showUp ? '<button class="btn-up" onclick="openModal(\''+p.transId+'\')"><i class="fas fa-cloud-upload-alt"></i> แจ้งโอนเงิน / อัปโหลดสลิป</button>' : '';
    var receiptH = showReceipt ? '<button class="btn-up" style="background:linear-gradient(135deg,#4CAF50,#2E7D32)" onclick="viewReceipt(\''+p.transId+'\')"><i class="fas fa-receipt"></i> ดู / พิมพ์ใบเสร็จ</button>' : '';

    card.innerHTML = '<div class="pbar '+bar+'"></div><div class="pb">'
      + '<div class="pt">'
      + '<div style="flex:1;min-width:0"><div class="ptit">'+p.title+'</div><div class="pmeta"><i class="fas fa-calendar-alt"></i> ปี '+p.year+' • เทอม '+p.term+'</div>'+docH+'</div>'
      + '<div style="text-align:right;flex-shrink:0"><div class="pamt">฿'+Number(p.amount).toLocaleString()+'</div>'
      + '<span class="pill '+pil+'">'+ico+' '+txt+'</span></div>'
      + '</div>'+note+qrH+upH+receiptH+'</div>';
    list.appendChild(card);

    if(showQR){
      (function(payment, elemId){
        var attempts = 0;
        function tryRender(){
          attempts++;
          var el = document.getElementById(elemId);
          if(!el) return;
          if(typeof qrcode === 'undefined'){
            if(attempts < 30){ setTimeout(tryRender, 150); return; }
            el.innerHTML = '<div style="color:#EF5350;font-size:.8rem;padding:8px;text-align:center">❌ โหลด QR Library ไม่สำเร็จ</div>';
            return;
          }
          var payload = buildQR(qrType, fullBillerId, payment.ref1, payment.ref2, payment.amount);
          if(!payload){
            var msg = qrType === 'PROMPTPAY' ? 'Tax ID ต้องมี 13 หลัก' : 'Biller ID ต้องมี 15 หลัก';
            el.innerHTML = '<div style="color:#EF5350;font-size:.8rem;padding:8px;text-align:center">❌ ข้อมูลตั้งค่าไม่ถูกต้อง<br>('+msg+')</div>';
            return;
          }
          try {
            // typeNumber: 0 = auto detect, errorCorrectionLevel: 'M'
            var qr = qrcode(0, 'M');
            qr.addData(payload);
            qr.make();
            // สร้าง SVG ที่ใช้ได้บนทุกมือถือ — ไม่พึ่ง image loading
            // cellSize 6 × moduleCount = ขนาด QR
            var moduleCount = qr.getModuleCount();
            var cellSize = Math.floor(180 / moduleCount);
            var size = cellSize * moduleCount;
            var margin = Math.floor((180 - size) / 2);

            var svg = '<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180" shape-rendering="crispEdges" style="display:block">';
            svg += '<rect width="180" height="180" fill="#fff"/>';
            for (var r = 0; r < moduleCount; r++) {
              for (var c = 0; c < moduleCount; c++) {
                if (qr.isDark(r, c)) {
                  var x = margin + c * cellSize;
                  var y = margin + r * cellSize;
                  svg += '<rect x="'+x+'" y="'+y+'" width="'+cellSize+'" height="'+cellSize+'" fill="#000"/>';
                }
              }
            }
            svg += '</svg>';
            el.innerHTML = svg;
          } catch(err){
            el.innerHTML = '<div style="color:#EF5350;font-size:.8rem;padding:8px;text-align:center">❌ สร้าง QR ไม่สำเร็จ: '+err.message+'</div>';
          }
        }
        setTimeout(tryRender, 50);
      })(p, qrId);
    }
  });
}

function openModal(tid){
  document.getElementById('utid').value  = tid;
  document.getElementById('payer').value = '';
  document.getElementById('slipFile').value = '';
  document.getElementById('upModal').classList.add('open');
}
function closeModal(){ document.getElementById('upModal').classList.remove('open'); }
document.getElementById('upModal').addEventListener('click',function(e){ if(e.target===this) closeModal(); });

/* ════════════════════════════════
   UPLOAD
════════════════════════════════ */
function doUpload(){
  var payer   = document.getElementById('payer').value.trim();
  var fi      = document.getElementById('slipFile');
  var btn     = document.getElementById('btnSub');
  var transId = document.getElementById('utid').value;
  if(!payer)         { toast('กรุณากรอกชื่อผู้โอน','exclamation-triangle'); return; }
  if(!fi.files.length){ toast('กรุณาเลือกไฟล์สลิป','exclamation-triangle'); return; }

  var file = fi.files[0];
  if(file.size > 5 * 1024 * 1024){
    Swal.fire({icon:'warning',title:'ไฟล์ใหญ่เกินไป',text:'กรุณาเลือกไฟล์ขนาดไม่เกิน 5MB',confirmButtonColor:'#FF6B35'}); return;
  }

  btn.disabled=true; btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> กำลังอัปโหลด...';

  uploadSlipToStorage(file, transId)
    .then(function(slipUrl){
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังบันทึก...';
      return api('/payment/upload-slip', {
        method: 'POST',
        body: { transId: transId, payerName: payer, slipUrl: slipUrl }
      });
    })
    .then(function(){
      btn.disabled=false; btn.innerHTML='<i class="fas fa-paper-plane"></i> ยืนยันการส่งข้อมูล';
      closeModal();
      Swal.fire({icon:'success',title:'แจ้งโอนเงินสำเร็จ!',text:'รอเจ้าหน้าที่ตรวจสอบ',confirmButtonColor:'#4CAF50'})
        .then(function(){ doSearch(); });
    })
    .catch(function(err){
      btn.disabled=false; btn.innerHTML='<i class="fas fa-paper-plane"></i> ยืนยันการส่งข้อมูล';
      Swal.fire({icon:'error',title:'Error',text:err.message||'อัปโหลดไม่สำเร็จ',confirmButtonColor:'#FF6B35'});
    });
}

function viewReceipt(transId){
  // ใช้ student/search หา payment + แสดงใบเสร็จ HTML
  api('/student/search?idCard=' + encodeURIComponent(window.__currentIdCard||''))
    .then(function(r){
      var p = (r.payments || []).find(function(x){ return x.transId === transId; });
      if (!p || p.status !== 'ชำระแล้ว') {
        Swal.fire('ไม่พบข้อมูล','รายการนี้ยังไม่ได้ชำระ','warning');
        return;
      }
      renderReceiptModal(p, r.student);
    });
}

function renderReceiptModal(p, s){
  var cfg = window.__siteCfg || {};
  var dt = p.timestamp ? new Date(p.timestamp) : new Date();
  var dtTH = dt.toLocaleDateString('th-TH', { year:'numeric', month:'long', day:'numeric' });
  var receiptNo = p.receiptNo || '(ยังไม่ได้ออกใบเสร็จ)';

  var html = '<div id="receiptArea" style="background:#fff;color:#000;padding:24px;text-align:left;font-family:\'Sarabun\',sans-serif">'
    + '<div style="text-align:center;border-bottom:2px solid #333;padding-bottom:14px;margin-bottom:14px">'
    + (cfg.logoUrl ? '<img src="'+cfg.logoUrl+'" style="height:60px;margin-bottom:8px">' : '')
    + '<div style="font-size:1.3rem;font-weight:700">'+(cfg.schoolName||'โรงเรียน')+'</div>'
    + (cfg.taxId ? '<div style="font-size:.85rem;color:#666">เลขประจำตัวผู้เสียภาษี: '+cfg.taxId+'</div>' : '')
    + '<div style="font-size:1.1rem;font-weight:700;margin-top:8px;color:#FF6B35">ใบเสร็จรับเงิน / RECEIPT</div>'
    + '</div>'

    + '<div style="display:flex;justify-content:space-between;font-size:.9rem;margin-bottom:14px">'
    + '<div><strong>เลขที่ใบเสร็จ:</strong> '+receiptNo+'</div>'
    + '<div><strong>วันที่:</strong> '+dtTH+'</div>'
    + '</div>'

    + '<div style="background:#F5F5F5;padding:12px;border-radius:8px;margin-bottom:14px;font-size:.9rem">'
    + '<div><strong>ชื่อ:</strong> '+(s.name||'-')+'</div>'
    + '<div><strong>ชั้น:</strong> '+(s.class||'-')+' &nbsp; <strong>รหัสนักเรียน:</strong> '+(s.studentId||'-')+'</div>'
    + '</div>'

    + '<table style="width:100%;border-collapse:collapse;font-size:.9rem;margin-bottom:14px">'
    + '<thead><tr style="background:#FF6B35;color:#fff">'
    + '<th style="padding:8px;text-align:left">รายการ</th>'
    + '<th style="padding:8px;text-align:right;width:100px">จำนวน</th>'
    + '</tr></thead>'
    + '<tbody><tr>'
    + '<td style="padding:10px;border-bottom:1px solid #ddd">'+p.title+' (ปี '+p.year+' เทอม '+p.term+')</td>'
    + '<td style="padding:10px;border-bottom:1px solid #ddd;text-align:right">฿'+Number(p.amount).toLocaleString('th-TH',{minimumFractionDigits:2})+'</td>'
    + '</tr></tbody>'
    + '<tfoot><tr style="background:#FFF3E0">'
    + '<td style="padding:10px;font-weight:700;text-align:right">รวมทั้งสิ้น</td>'
    + '<td style="padding:10px;font-weight:700;text-align:right;color:#E65100">฿'+Number(p.amount).toLocaleString('th-TH',{minimumFractionDigits:2})+'</td>'
    + '</tr></tfoot>'
    + '</table>'

    + '<div style="font-size:.85rem;color:#666;margin-top:14px">'
    + '<div><strong>วิธีชำระ:</strong> '+(p.payerName||'-')+'</div>'
    + (p.ref1 ? '<div><strong>Ref.1:</strong> '+p.ref1+'</div>' : '')
    + (p.ref2 ? '<div><strong>Ref.2:</strong> '+p.ref2+'</div>' : '')
    + '</div>'

    + '<div style="text-align:center;margin-top:24px;font-size:.78rem;color:#999;border-top:1px dashed #ccc;padding-top:14px">'
    + 'เอกสารนี้พิมพ์จากระบบคอมพิวเตอร์ ไม่ต้องลงนาม<br>'
    + 'This receipt is computer generated.'
    + '</div>'
    + '</div>';

  Swal.fire({
    html: html,
    width: 600,
    showConfirmButton: true,
    confirmButtonText: '<i class="fas fa-print"></i> พิมพ์ / บันทึกเป็น PDF',
    confirmButtonColor: '#FF6B35',
    showCancelButton: true,
    cancelButtonText: 'ปิด',
    cancelButtonColor: '#9E9E9E',
    customClass: { popup: 'receipt-popup' }
  }).then(function(r){
    if (r.isConfirmed) printReceipt();
  });
}

function printReceipt(){
  var area = document.getElementById('receiptArea');
  if (!area) return;
  var w = window.open('', '_blank', 'width=800,height=600');
  w.document.write('<!doctype html><html><head><title>ใบเสร็จ</title>'
    + '<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">'
    + '<style>body{font-family:Sarabun,sans-serif;margin:0;padding:20px;background:#fff}@media print{body{padding:0}}</style>'
    + '</head><body>'+area.outerHTML+'</body></html>');
  w.document.close();
  setTimeout(function(){ w.print(); }, 500);
}
</script>
